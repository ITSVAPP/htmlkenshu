<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>背景に色を付けたい</title>
    <style>
      /* 背景色は background-color。ページ全体なら body に指定します */
      body {
        background-color: #eef6ff;
      }
      .box {
        background-color: #ffd966;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <p>ページ全体の背景にうすい青を付けています。</p>
    <div class="box">この部分だけ別の背景色にもできます。</div>
  </body>
</html>
