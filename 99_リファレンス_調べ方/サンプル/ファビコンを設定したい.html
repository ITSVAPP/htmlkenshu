<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ファビコンを設定したい</title>

    <!--
      ファビコンは、ブラウザのタブに表示される小さなアイコンです。
      <link rel="icon" href="アイコン画像の場所" /> で設定します。
      ・画像は .ico / .png などが使えます。
      ・変えたのにタブに出ないときは、ページを強制更新（Ctrl + F5）してみましょう（あるある）。
    -->
    <link rel="icon" href="images/favicon.ico" />
  </head>
  <body>
    <p>ブラウザのタブを見ると、左側に小さなアイコンが表示されます。</p>
  </body>
</html>
