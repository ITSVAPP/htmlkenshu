<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>リンクを貼りたい</title>
  </head>
  <body>
    <!-- リンクは a タグ。href にリンク先の URL を書きます -->
    <p><a href="https://developer.mozilla.org/ja/">MDN（HTML/CSS の公式リファレンス）を開く</a></p>
    <!-- 別タブで開きたいときは target="_blank" を付けます -->
    <p>
      <a href="https://developer.mozilla.org/ja/" target="_blank" rel="noopener">
        別タブで開く
      </a>
    </p>
  </body>
</html>
