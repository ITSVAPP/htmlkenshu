<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>表を作りたい</title>
    <style>
      /* 線を見やすくするための最低限のスタイル */
      table {
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #888;
        padding: 4px 8px;
      }
    </style>
  </head>
  <body>
    <!-- table=表、tr=行、th=見出しのセル、td=データのセル -->
    <table>
      <tr>
        <th>名前</th>
        <th>年齢</th>
      </tr>
      <tr>
        <td>たろう</td>
        <td>20</td>
      </tr>
      <tr>
        <td>はなこ</td>
        <td>22</td>
      </tr>
    </table>
  </body>
</html>
