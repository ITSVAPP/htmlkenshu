<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>文字の色やサイズを変えたい</title>
    <style>
      /* 色は color、大きさは font-size で指定します（昔の font タグは使いません） */
      .red {
        color: #e2401b;
      }
      .big {
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <p class="red">これは赤い文字です。</p>
    <p class="big">これは大きい文字です。</p>
    <p><span class="red big">色と大きさを両方</span>変えることもできます。</p>
  </body>
</html>
