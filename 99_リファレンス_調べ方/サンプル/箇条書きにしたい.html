<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>箇条書きにしたい</title>
  </head>
  <body>
    <!-- 順番なしは ul、番号付きは ol。中の項目は li で書きます -->
    <h2>順番なしの箇条書き（ul）</h2>
    <ul>
      <li>りんご</li>
      <li>みかん</li>
      <li>ぶどう</li>
    </ul>

    <h2>番号付きの箇条書き（ol）</h2>
    <ol>
      <li>準備する</li>
      <li>作る</li>
      <li>確認する</li>
    </ol>
  </body>
</html>
