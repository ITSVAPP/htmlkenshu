<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube動画を埋め込みたい</title>
  </head>
  <body>
    <!--
      YouTube 動画も「埋め込み」コードで表示できます。
      手順: YouTube で動画を開く → 「共有」→「埋め込む」→ <iframe> のコードをコピー
      下のサンプルでは、src の末尾が動画ごとの ID です。
        例) https://www.youtube.com/embed/ここに動画ID
      自分の動画にするときは、コピーしたコードにまるごと差し替えればOK。
    -->
    <iframe
      width="400"
      height="225"
      src="https://www.youtube.com/embed/eNfFRNsmnj8"
      title="YouTube 動画"
      style="border: 0"
      allowfullscreen
    ></iframe>
  </body>
</html>
