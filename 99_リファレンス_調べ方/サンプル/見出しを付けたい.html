<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>見出しを付けたい</title>
  </head>
  <body>
    <!--
      見出しは <h1>〜<h6> の 6 種類です。
      ・数字が小さいほど大きく、重要な見出しになります（h1 が一番大きい）。
      ・<h1> は「そのページの主役の見出し」なので、1 ページに 1 個が基本です。
      ・見出しは「文章の構造（章・節）」を表すために使います。
        “ただ文字を大きくしたいだけ” のときは font-size を使いましょう。
    -->
    <h1>大見出し（h1）ページのタイトルなど</h1>
    <h2>中見出し（h2）大きなまとまり</h2>
    <h3>小見出し（h3）その中の小分け</h3>

    <!-- 見出しの下に続く本文は <p>（段落）で書きます -->
    <p>見出しの下の文章は p タグで書きます。</p>
  </body>
</html>
