<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>改行・段落を分けたい</title>
  </head>
  <body>
    <!--
      文章のまとまり（段落）は <p> で分けます。これが基本です。
      ・<p> と <p> の間には自然とすき間ができます。
      ・【あるある】エディタ上で改行しても、画面では改行されません。
        段落の“途中”でどうしても改行したいときだけ <br> を使います（使いすぎ注意）。
    -->
    <p>1 つ目の段落です。</p>
    <p>2 つ目の段落です。</p>

    <p>段落の途中で<br />改行したいときは br を使います。</p>
  </body>
</html>
