<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>CSSを外部ファイルに分けたい</title>
    <!-- CSS は別ファイルにして link で読み込むのがおすすめです -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1>見出し</h1>
    <p>見た目のルールは css/style.css に書いています。</p>
  </body>
</html>
