<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>背景に画像を敷きたい</title>
    <style>
      /* 背景画像は background-image。画面いっぱいに広げるなら background-size: cover; */
      body {
        background-image: url("images/背景.png");
        background-size: cover;
        background-position: center;
        height: 100vh;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <h1 style="color: #fff">背景に画像を敷いた例</h1>
  </body>
</html>
