<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文字を中央／右に寄せたい</title>
    <style>
      /*
        文字（テキスト）の左右の寄せは text-align で指定します。
        ・center＝中央、right＝右、left＝左（指定しないと左寄せ）。
        ※これは「文字」を寄せる指定です。
          箱（ボックス）ごと中央に置きたいときは「要素を中央に配置したい.html」を見てください。
      */
      .center {
        text-align: center; /* 中央寄せ */
      }
      .right {
        text-align: right; /* 右寄せ */
      }
    </style>
  </head>
  <body>
    <p class="center">中央寄せのテキスト</p>
    <p class="right">右寄せのテキスト</p>
    <p>指定しないと左寄せ（標準）です。</p>
  </body>
</html>
