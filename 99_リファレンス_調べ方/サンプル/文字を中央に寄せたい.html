<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>文字を中央に寄せたい</title>
    <style>
      /* 中央寄せは text-align: center;（昔の center タグや align 属性は使いません） */
      .center {
        text-align: center;
      }
      .right {
        text-align: right;
      }
    </style>
  </head>
  <body>
    <p class="center">中央寄せのテキスト</p>
    <p class="right">右寄せのテキスト</p>
    <p>指定なしは左寄せ（標準）です。</p>
  </body>
</html>
