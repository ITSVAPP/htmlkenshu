<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>箱の幅・高さを変えたい</title>
    <style>
      /*
        箱の大きさは width（横幅）と height（高さ）で指定します。
          px … ぴったりの大きさ（例: 200px）
          %  … 親の大きさに対する割合（例: 50% = 親の半分）
        【コツ】width: 100% で親いっぱいに広がります。
        スマホではみ出さないようにするには max-width（最大の幅）も便利です。
      */
      .fixed {
        width: 200px; /* 横幅 200px ぴったり */
        height: 80px; /* 高さ 80px ぴったり */
        background-color: #cfe8ff;
        margin-bottom: 12px;
      }
      .half {
        width: 50%; /* 親の幅の半分 */
        background-color: #ffd966;
      }
    </style>
  </head>
  <body>
    <p>幅 200px・高さ 80px の箱</p>
    <div class="fixed">200 × 80</div>

    <p>親の幅の 50% の箱（ブラウザの横幅を変えると、一緒に変わります）</p>
    <div class="half">width: 50%</div>
  </body>
</html>
