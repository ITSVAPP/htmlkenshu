<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>マウスを乗せたら変化させたい</title>
    <style>
      /* :hover でマウスを乗せたときの見た目を指定できます */
      .btn {
        display: inline-block;
        background-color: #1565c0;
        color: #fff;
        padding: 8px 16px;
        border-radius: 4px;
        transition: background-color 0.2s;
      }
      .btn:hover {
        background-color: #e2401b;
      }
    </style>
  </head>
  <body>
    <span class="btn">ここにマウスを乗せてみてください</span>
  </body>
</html>
