<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Googleマップを埋め込みたい</title>
  </head>
  <body>
    <!--
      Google マップは「埋め込み」コードを貼り付けます。
      手順: Google マップで場所を表示 → 共有 → 地図を埋め込む → HTML をコピー
      下はサンプル（東京駅）。loading="lazy" で表示を軽くしています。
    -->
    <iframe
      src="https://www.google.com/maps?q=東京駅&output=embed"
      width="400"
      height="300"
      style="border: 0"
      loading="lazy"
    ></iframe>
  </body>
</html>
