<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Googleマップを埋め込みたい</title>
  </head>
  <body>
    <!--
      地図は Google マップの「埋め込み」コードを貼り付けて表示します。
      手順: Google マップで場所を表示 → 共有 → 「地図を埋め込む」→ HTML をコピー
      下はサンプル（東京駅）。
        width / height … 地図の大きさ
        loading="lazy" … 表示を軽くするおまじない
    -->
    <iframe
      src="https://www.google.com/maps?q=東京駅&output=embed"
      width="400"
      height="300"
      style="border: 0"
      loading="lazy"
    ></iframe>
  </body>
</html>
